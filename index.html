<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Explorador do Mundo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>🌍 Destinos Incríveis</h1>
        <p>Encontre os pontos turísticos mais bonitos do planeta e saiba quanto custa visitar</p>
        
        <div class="search-wrapper">
            <input type="text" id="search-input" placeholder="Tente pesquisar por Brasil, Japão, França..." autofocus>
            <button id="search-btn">Buscar</button>
        </div>
    </header>

    <main>
        <div id="welcome-message" class="welcome-card">
            <p>Aguardando seu próximo destino... Digite um país acima e pressione buscar! ✈️</p>
        </div>

        <article id="destination-result" class="destination-card">
            <div class="image-box">
                <img id="card-img" src="" alt="Foto do local">
            </div>
            <div class="card-body">
                <span id="country-badge">País</span>
                <h2 id="place-title">Nome do Lugar</h2>
                <p id="place-text">Descrição detalhada da atração turística selecionada.</p>
                
                <div class="price-box">
                    <div class="price-info">
                        <span>Custo Médio de Viagem</span>
                        <strong id="place-cost">R$ 0,00</strong>
                    </div>
                </div>
            </div>
        </article>
    </main>

    <script src="script.js"></script>
</body>
</html>
