<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Explorador de Destinos Globais</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>🌍 Destinos Globais</h1>
        <p>Descubra pontos turísticos incríveis e uma estimativa de custos para a sua próxima aventura!</p>
        
        <div class="search-container">
            <input type="text" id="search-input" placeholder="Digite um país (ex: Brasil, França, Japão)..." autocomplete="off">
            <button id="search-btn">Buscar</button>
        </div>
    </header>

    <main>
        <section id="result-section" class="hidden">
            <div class="card">
                <div class="image-container">
                    <img id="place-image" src="" alt="Imagem do Ponto Turístico">
                </div>
                <div class="card-content">
                    <h2 id="country-title">País</h2>
                    <h3 id="place-name">Ponto Turístico</h3>
                    <p id="place-description">Descrição do lugar.</p>
                    <div class="price-tag">
                        <span>Custo Médio Estimado:</span>
                        <strong id="place-price">R$ 0,00</strong>
                    </div>
                </div>
            </div>
        </section>

        <section id="welcome-message">
            <p>Insira o nome de um país acima para abrir as portas do mundo! ✈️</p>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
